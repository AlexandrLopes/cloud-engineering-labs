AWSTemplateFormatVersion: "2010-09-09"
Description: "Serverless Event-Driven Architecture for High-Volume eSIM Order Processing using SQS, Lambda, and DynamoDB."

Resources:
  # 1. Customer Managed KMS Key (Fixes Trivy AWS-0135)
  EsimKmsKey:
    Type: AWS::KMS::Key
    Properties:
      Description: "Customer Managed Key for SQS encryption"
      EnableKeyRotation: true
      KeyPolicy:
        Version: "2012-10-17"
        Statement:
          - Sid: Enable IAM User Permissions
            Effect: Allow
            Principal:
              AWS: !Sub "arn:aws:iam::${AWS::AccountId}:root"
            Action: kms:*
            Resource: "*"

  # 2. Dead-Letter Queue (catches orders that fail repeatedly)
  EsimOrdersDLQ:
    Type: AWS::SQS::Queue
    Properties:
      QueueName: esim-orders-dlq
      MessageRetentionPeriod: 1209600  # 14 days — enough time to investigate before it's gone
      KmsMasterKeyId: !GetAtt EsimKmsKey.Arn
      KmsDataKeyReusePeriodSeconds: 300

  # 3. SQS Queue (Encrypted with Customer Managed Key, redrives to DLQ after 3 failed attempts)
  EsimOrdersQueue:
    Type: AWS::SQS::Queue
    Properties:
      QueueName: esim-orders-queue
      VisibilityTimeout: 30
      KmsMasterKeyId: !GetAtt EsimKmsKey.Arn
      KmsDataKeyReusePeriodSeconds: 300
      RedrivePolicy:
        deadLetterTargetArn: !GetAtt EsimOrdersDLQ.Arn
        maxReceiveCount: 3

  # 4. DynamoDB Table (High-performance NoSQL database)
  EsimProfilesTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: esim-active-profiles
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: order_id
          AttributeType: S
      KeySchema:
        - AttributeName: order_id
          KeyType: HASH

  # 5. SNS Topic + Alarm — someone actually gets notified when the DLQ isn't empty
  DlqAlertTopic:
    Type: AWS::SNS::Topic
    Properties:
      TopicName: esim-dlq-alerts

  DlqDepthAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: esim-orders-dlq-not-empty
      AlarmDescription: "Fires when a message lands in the eSIM orders DLQ — an order failed processing after 3 retries and needs investigation."
      Namespace: AWS/SQS
      MetricName: ApproximateNumberOfMessagesVisible
      Dimensions:
        - Name: QueueName
          Value: !GetAtt EsimOrdersDLQ.QueueName
      Statistic: Sum
      Period: 300
      EvaluationPeriods: 1
      Threshold: 0
      ComparisonOperator: GreaterThanThreshold
      AlarmActions:
        - !Ref DlqAlertTopic
      TreatMissingData: notBreaching

  # 6. IAM Role (Strict Least Privilege + KMS Decrypt permissions)
  EsimProcessorRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: EsimProcessingPolicy
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - sqs:ReceiveMessage
                  - sqs:DeleteMessage
                  - sqs:GetQueueAttributes
                Resource: !GetAtt EsimOrdersQueue.Arn
              - Effect: Allow
                Action:
                  - dynamodb:PutItem
                Resource: !GetAtt EsimProfilesTable.Arn
              - Effect: Allow
                Action:
                  - kms:Decrypt
                  - kms:GenerateDataKey
                Resource: !GetAtt EsimKmsKey.Arn
              - Effect: Allow
                Action:
                  - logs:CreateLogGroup
                  - logs:CreateLogStream
                  - logs:PutLogEvents
                Resource: arn:aws:logs:*:*:*

  # 7. AWS Lambda (Pulls orders from the SQS queue, generates the eSIM profile,
  #    and now reports per-message failures instead of swallowing them)
  EsimProcessorLambda:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: esim-order-processor
      Handler: index.lambda_handler
      Role: !GetAtt EsimProcessorRole.Arn
      Runtime: python3.12
      Timeout: 10
      Environment:
        Variables:
          DYNAMO_TABLE: !Ref EsimProfilesTable
      Code:
        ZipFile: |
          import boto3
          import os
          import json
          import uuid

          dynamodb = boto3.resource('dynamodb')
          table_name = os.environ['DYNAMO_TABLE']
          table = dynamodb.Table(table_name)

          def lambda_handler(event, context):
              # Track which messages actually failed so SQS only retries those —
              # not the whole batch, and not silently drops them either.
              batch_item_failures = []

              for record in event['Records']:
                  message_id = record['messageId']
                  try:
                      payload = json.loads(record['body'])
                      order_id = payload.get('order_id', str(uuid.uuid4()))
                      customer_id = payload.get('customer_id', 'UNKNOWN')

                      print(f"Processing eSIM order for customer: {customer_id}")

                      simulated_iccid = f"8901410321111{str(uuid.uuid4().int)[:6]}"

                      table.put_item(
                          Item={
                              'order_id': order_id,
                              'customer_id': customer_id,
                              'iccid': simulated_iccid,
                              'status': 'ACTIVATED'
                          }
                      )
                      print(f"Successfully generated and stored eSIM ICCID: {simulated_iccid}")

                  except Exception as e:
                      print(f"Error processing order (messageId={message_id}): {str(e)}")
                      batch_item_failures.append({"itemIdentifier": message_id})

              # Only the failed message IDs go back to SQS for retry / eventual DLQ redrive.
              # Successfully processed messages in the same batch are still deleted normally.
              return {"batchItemFailures": batch_item_failures}

  # 8. Event Source Mapping (Connects the SQS Queue to the Lambda Function,
  #    with partial batch failure reporting enabled)
  LambdaSqsTrigger:
    Type: AWS::Lambda::EventSourceMapping
    Properties:
      EventSourceArn: !GetAtt EsimOrdersQueue.Arn
      FunctionName: !Ref EsimProcessorLambda
      BatchSize: 10
      Enabled: true
      FunctionResponseTypes:
        - ReportBatchItemFailures
